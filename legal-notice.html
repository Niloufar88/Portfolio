<!doctype html>
<html lang="en" id="root-html">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <!-- LATE HEADER SECTION-->
      <section class="header">
        <div class="header-container">
          <div class="header-logo">
            <img
              src="assets/components/header/Logo-header-footer.svg"
              alt=""
              class="header-logo"
            />
            <span class="header-dev-name anta">N.Shirvani</span>
            <span
              class="header-dev-role josefin-sans"
              data-i18n="headerDevRole"
            ></span>
          </div>
          <div class="header-menu">
            <nav>
              <ul>
                <li
                  class="header-link josefin-sans"
                  id="why-me"
                  data-i18n="menuItem1"
                ></li>
                <li
                  class="header-link josefin-sans"
                  id="skills"
                  data-i18n="menuItem2"
                ></li>
                <li
                  class="header-link josefin-sans"
                  id="projects"
                  data-i18n="menuItem3"
                ></li>
                <li
                  class="header-link josefin-sans"
                  id="contact"
                  data-i18n="menuItem4"
                ></li>
              </ul>
            </nav>
          </div>
          <div class="lang-switcher" id="lang-switcher">
            <a href="" class="header-language-text josefin-sans" data-id="de"
              >DE</a
            >
            <a href="" class="header-language-text josefin-sans" data-id="en"
              >EN</a
            >
          </div>
        </div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer>
      <div class="footer-content-container">
        <div class="legal-notice">
          <a href="#" class="footer-link josefin-sans">legal notice</a>
          <span class="footer-copyright josefin-sans"
            >&copy; Niloufar Shirvani 2026</span
          >
        </div>
        <div class="footer-logo">
          <img
            src="assets/components/header/Logo-header-footer.svg"
            alt=""
            class="footer-logo"
          />
          <span class="footer-dev-name anta">N.Shirvani</span>
          <span class="footer-dev-role josefin-sans">developer</span>
        </div>
        <div class="footer-social-media">
          <a href="#"
            ><img
              src="assets/components/footer/git-dark-default.svg"
              id="footer-git"
              alt=""
          /></a>
          <a href="#"
            ><img
              src="assets/components/footer/email-dark-default.svg"
              id="footer-email"
              alt=""
          /></a>
          <a href="#"
            ><img
              src="assets/components/footer/linkedIn-dark-default.svg"
              id="footer-linkedIn"
              alt=""
          /></a>
        </div>
      </div>
    </footer>

    <!-- JS -->
    <script src="scripts/changingLanguage.js"></script>
    <script src="scripts/script.js"></script>
    <script src="scripts/scroll.js"></script>
    <script src="scripts/typingEffect.js"></script>
  </body>
</html>
